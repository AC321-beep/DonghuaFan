name: Build and Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Updated from v3 to v4 to fix the Node.js deprecation warning
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Updated from v3 to v4 to fix the Node.js deprecation warning
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew make
