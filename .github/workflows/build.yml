name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Downloads a clean wrapper jar to overwrite the broken one
      - name: Fix and Regenerate Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      # FIX: Grants execution permissions to BOTH the gradlew script AND the downloaded jar binary
      - name: Grant execute permission for gradlew and wrapper
        run: |
          chmod +x gradlew
          chmod +x gradle/wrapper/gradle-wrapper.jar

      - name: Build Plugins
        run: ./gradlew make makePluginsJson

      - name: Push builds
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: false
