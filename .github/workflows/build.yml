name: Build and Deploy
on:
  push:
    branches:
      - master
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Download Gradle Wrapper JAR
        run: |
          curl -fL -o gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-8.9-bin.zip" \
            --output /tmp/gradle.zip
          unzip -p /tmp/gradle.zip "gradle-8.9/lib/gradle-wrapper-*.jar" \
            > gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          unzip /tmp/gradle.zip -d /tmp/gradle-dist && \
          find /tmp/gradle-dist -name "gradle-wrapper.jar" -exec cp {} gradle/wrapper/gradle-wrapper.jar \;
          chmod +x gradlew gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar
      - name: Build Plugins
        run: ./gradlew make makePluginsJson --no-configuration-cache
      - name: Push builds
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds
          clean: false
